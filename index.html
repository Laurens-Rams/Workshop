<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>It's working!</title>
<style>
  :root {
    --bg: #fff8ed;
    --text: #2b2b2b;
    --accent: #ff7a45;
    --accent-dark: #d85f2c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    padding: 24px;
  }
  main {
    max-width: 480px;
    width: 100%;
    text-align: center;
  }
  h1 {
    font-size: 2.4rem;
    line-height: 1.2;
    margin: 0 0 16px;
  }
  p {
    font-size: 1.4rem;
    line-height: 1.5;
    margin: 0 0 32px;
  }
  button {
    display: block;
    width: 100%;
    font-size: 1.4rem;
    font-weight: 600;
    padding: 20px;
    margin-bottom: 16px;
    border-radius: 16px;
    border: none;
    cursor: pointer;
    background: var(--accent);
    color: white;
  }
  button:active {
    background: var(--accent-dark);
  }
  .emoji {
    font-size: 3.5rem;
    margin-bottom: 16px;
  }
</style>
</head>
<body>
<main>
  <div class="emoji">✅</div>
  <h1>It's working!</h1>
  <p>You opened the test page on your phone. Thank you for helping us build this.</p>
  <button onclick="readAloud()">🔊 Read it out loud</button>
</main>
<script>
function readAloud() {
  const text = "It's working! You opened the test page on your phone. Thank you for helping us build this.";
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = 0.9;
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}
</script>
</body>
</html>
